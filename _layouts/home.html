---
layout: default
---

<div class="hero-section">
  <div class="hero-image-container">
    <img src="/assets/images/heroimage.png" alt="Sky background" class="hero-image" id="hero-image">
    <div class="hero-gradient-overlay"></div>
  </div>
  <div class="hero-text">
    <img src="/assets/images/portfolio.gif" alt="Portfolio — Ben" class="hero-gif">
    <span id="hero-typed" data-text="Creative Developer" aria-label="Creative Developer"></span>
    <p class="hero-tagline">{{ page.tagline | default: "Building interactive systems that blend code, AI, and physical computing" }}</p>
    <div class="hero-cta-container">
      <a href="/projects/" class="btn" aria-label="View all projects">View My Work</a>
      <a href="#contact" class="btn btn-secondary" aria-label="Jump to contact section">Get in Touch</a>
    </div>
    <div>
      <a href="{{ '/assets/images/about/Benjamin Jones Resume (4).pdf' | relative_url }}" class="hero-resume" target="_blank">Resume</a>
    </div>
  </div>
</div>

<main class="page-content-container">
  {{ content }}
</main>

<script src="{{ '/assets/js/hero-typing.js' | relative_url }}" defer></script>
